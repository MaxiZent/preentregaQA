<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora-QA</title>
    <link rel="stylesheet" href="estilos.css" />
</head>

<body>
    <main class="calculadora" id="calculadora">
        <h1>Calculadora QA</h1>
        <form id="form-calculadora" name="form-calculadora">
            <input type="text" id="pantalla" name="pantalla" class="pantalla" readonly />

            <div class="botones">
                <button type="button" class="btn" id="btn-7">7</button>
                <button type="button" class="btn" id="btn-8">8</button>
                <button type="button" class="btn" id="btn-9">9</button>
                <button type="button" class="btn operador" id="btn-dividir">/</button>

                <button type="button" class="btn" id="btn-4">4</button>
                <button type="button" class="btn" id="btn-5">5</button>
                <button type="button" class="btn" id="btn-6">6</button>
                <button type="button" class="btn operador" id="btn-multiplicar">*</button>

                <button type="button" class="btn" id="btn-1">1</button>
                <button type="button" class="btn" id="btn-2">2</button>
                <button type="button" class="btn" id="btn-3">3</button>
                <button type="button" class="btn operador" id="btn-restar">-</button>

                <button type="button" class="btn" id="btn-0">0</button>
                <button type="button" class="btn" id="btn-punto">.</button>
                <button type="button" class="btn" id="btn-igual">=</button>
                <button type="button" class="btn operador" id="btn-sumar">+</button>

                <button type="reset" class="btn limpiar" id="btn-limpiar">C</button>
            </div>
        </form>
    </main>
</body>

</html>
